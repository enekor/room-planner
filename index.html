<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<title>Planificador de Habitacion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; }

  /* Sidebar */
  .sidebar {
    width: 280px; background: #16213e; padding: 14px; display: flex;
    flex-direction: column; gap: 10px; overflow-y: auto; border-right: 1px solid #0f3460;
    flex-shrink: 0; touch-action: pan-y;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .sidebar h1 { font-size: 17px; color: #e94560; }
  .sidebar h2 { font-size: 12px; color: #777; font-weight: normal; margin-bottom: 4px; }

  .section { background: #0f3460; border-radius: 8px; padding: 10px; }
  .section-title { font-size: 11px; text-transform: uppercase; color: #e94560; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700; }

  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .row label { font-size: 12px; min-width: 55px; }
  .row input[type="number"] {
    width: 68px; padding: 5px 6px; background: #1a1a2e; border: 1px solid #333;
    border-radius: 5px; color: #fff; font-size: 12px; text-align: center;
  }
  .row .unit { font-size: 11px; color: #666; }

  .btn {
    padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: all .15s;
  }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-primary:hover { background: #c73652; }
  .btn-secondary { background: #1a1a2e; color: #ccc; border: 1px solid #333; }
  .btn-secondary:hover { background: #252545; }
  .btn-danger { background: #6b1525; color: #e94560; }
  .btn-danger:hover { background: #8b1e30; }
  .btn-sm { padding: 4px 8px; font-size: 11px; }

  /* Catalog */
  .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .catalog-item {
    background: #1a1a2e; border: 1px solid #333; border-radius: 6px;
    padding: 8px 4px; text-align: center; cursor: grab; font-size: 11px;
    transition: all .15s; user-select: none; touch-action: none;
  }
  .catalog-item:hover, .catalog-item:active { border-color: #e94560; background: #252545; }
  .catalog-item .icon { font-size: 22px; }
  .catalog-item .name { color: #ccc; font-size: 10px; }

  /* Custom furniture */
  #customSection input[type="text"] {
    width: 100%; padding: 5px 6px; background: #1a1a2e; border: 1px solid #333;
    border-radius: 5px; color: #fff; font-size: 12px; margin-bottom: 5px;
  }

  /* Properties */
  .properties { display: none; }
  .properties.active { display: block; }
  .prop-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .prop-row label { font-size: 12px; }
  .prop-row input {
    width: 62px; padding: 4px 5px; background: #1a1a2e; border: 1px solid #333;
    border-radius: 5px; color: #fff; font-size: 12px; text-align: center;
  }
  .color-options { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .color-swatch {
    width: 22px; height: 22px; border-radius: 5px; cursor: pointer;
    border: 2px solid transparent; transition: border .15s;
  }
  .color-swatch.active { border-color: #fff; }

  /* Canvas area */
  .canvas-area { flex: 1; display: flex; flex-direction: column; }
  .toolbar {
    height: 38px; background: #16213e; display: flex; align-items: center;
    padding: 0 10px; gap: 6px; border-bottom: 1px solid #0f3460; flex-shrink: 0;
  }
  .toolbar .info { margin-left: auto; font-size: 11px; color: #777; }
  .canvas-wrap {
    flex: 1; position: relative; overflow: hidden; background: #1a1a2e;
    touch-action: none;
  }
  canvas { position: absolute; top: 0; left: 0; }

  /* Drag ghost */
  .drag-ghost {
    position: fixed; pointer-events: none; z-index: 999;
    background: #0f3460cc; border: 2px solid #e94560; border-radius: 6px;
    padding: 6px 12px; color: #fff; font-size: 12px; font-weight: 600;
    display: none; white-space: nowrap;
  }

  /* Tooltip */
  .tooltip {
    position: fixed; background: #0f3460ee; color: #fff; padding: 4px 8px;
    border-radius: 5px; font-size: 11px; pointer-events: none; z-index: 100;
    display: none; white-space: nowrap;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div>
    <h1>Planificador de Habitacion</h1>
    <h2>Arrastra muebles al plano</h2>
  </div>

  <!-- Room -->
  <div class="section">
    <div class="section-title">Habitacion</div>
    <div class="row">
      <label>Ancho:</label>
      <input type="number" id="roomWidth" value="5" min="1" max="30" step="0.1">
      <span class="unit">m</span>
    </div>
    <div class="row">
      <label>Largo:</label>
      <input type="number" id="roomHeight" value="4" min="1" max="30" step="0.1">
      <span class="unit">m</span>
    </div>
    <button class="btn btn-primary" onclick="updateRoom()" style="width:100%;margin-top:4px">Aplicar</button>
  </div>

  <!-- Structure -->
  <div class="section">
    <div class="section-title">Estructura</div>
    <div class="catalog">
      <div class="catalog-item" data-type="door"><div class="icon">🚪</div><div class="name">Puerta</div></div>
      <div class="catalog-item" data-type="window"><div class="icon">🪟</div><div class="name">Ventana</div></div>
    </div>
  </div>

  <!-- Furniture -->
  <div class="section">
    <div class="section-title">Muebles</div>
    <div class="catalog">
      <div class="catalog-item" data-type="bed_single"><div class="icon">🛏️</div><div class="name">Cama ind.</div></div>
      <div class="catalog-item" data-type="bed_double"><div class="icon">🛏️</div><div class="name">Cama doble</div></div>
      <div class="catalog-item" data-type="sofa"><div class="icon">🛋️</div><div class="name">Sofa</div></div>
      <div class="catalog-item" data-type="table"><div class="icon">🪑</div><div class="name">Mesa</div></div>
      <div class="catalog-item" data-type="desk"><div class="icon">🖥️</div><div class="name">Escritorio</div></div>
      <div class="catalog-item" data-type="wardrobe"><div class="icon">👔</div><div class="name">Armario</div></div>
      <div class="catalog-item" data-type="chair"><div class="icon">💺</div><div class="name">Silla</div></div>
      <div class="catalog-item" data-type="nightstand"><div class="icon">🔲</div><div class="name">Mesita</div></div>
      <div class="catalog-item" data-type="bookshelf"><div class="icon">📚</div><div class="name">Estanteria</div></div>
      <div class="catalog-item" data-type="tv"><div class="icon">📺</div><div class="name">TV</div></div>
      <div class="catalog-item" data-type="dining_table"><div class="icon">🍽️</div><div class="name">Mesa comedor</div></div>
      <div class="catalog-item" data-type="fridge"><div class="icon">🧊</div><div class="name">Nevera</div></div>
    </div>
  </div>

  <!-- Custom -->
  <div class="section" id="customSection">
    <div class="section-title">Mueble Personalizado</div>
    <input type="text" id="customName" placeholder="Nombre del mueble">
    <div class="row">
      <label>Ancho:</label>
      <input type="number" id="customW" value="0.8" min="0.1" max="10" step="0.1">
      <span class="unit">m</span>
    </div>
    <div class="row">
      <label>Largo:</label>
      <input type="number" id="customH" value="0.8" min="0.1" max="10" step="0.1">
      <span class="unit">m</span>
    </div>
    <button class="btn btn-secondary" onclick="addCustom()" style="width:100%;margin-top:4px">Agregar</button>
  </div>

  <!-- Properties -->
  <div class="section properties" id="propsPanel">
    <div class="section-title">Propiedades</div>
    <div id="propName" style="font-size:13px;font-weight:700;margin-bottom:6px"></div>
    <div class="prop-row"><label>Ancho (m):</label><input type="number" id="propW" min="0.05" max="20" step="0.05" onchange="applyProps()"></div>
    <div class="prop-row"><label>Largo (m):</label><input type="number" id="propH" min="0.05" max="20" step="0.05" onchange="applyProps()"></div>
    <div class="prop-row"><label>Pos X (m):</label><input type="number" id="propX" min="-5" max="35" step="0.05" onchange="applyProps()"></div>
    <div class="prop-row"><label>Pos Y (m):</label><input type="number" id="propY" min="-5" max="35" step="0.05" onchange="applyProps()"></div>
    <div class="prop-row"><label>Rotacion °:</label><input type="number" id="propR" min="0" max="360" step="15" onchange="applyProps()"></div>
    <div class="color-options" id="colorOpts"></div>
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="rotSel(-15)">↺ 15°</button>
      <button class="btn btn-secondary btn-sm" onclick="rotSel(15)">↻ 15°</button>
      <button class="btn btn-secondary btn-sm" onclick="dupSel()">Duplicar</button>
      <button class="btn btn-danger btn-sm" onclick="delSel()">Eliminar</button>
    </div>
  </div>
</div>

<!-- Canvas -->
<div class="canvas-area">
  <div class="toolbar">
    <button class="btn btn-secondary btn-sm" onclick="zoomIn()">+</button>
    <button class="btn btn-secondary btn-sm" onclick="zoomOut()">-</button>
    <button class="btn btn-secondary btn-sm" onclick="resetView()">Centrar</button>
    <button class="btn btn-secondary btn-sm" id="gridBtn" onclick="toggleGrid()">Cuadricula: ON</button>
    <button class="btn btn-secondary btn-sm" id="snapBtn" onclick="toggleSnap()">Snap: ON</button>
    <button class="btn btn-secondary btn-sm" id="lblBtn" onclick="toggleLabels()">Medidas: ON</button>
    <span class="info" id="infoBar"></span>
  </div>
  <div class="canvas-wrap" id="wrap">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div class="drag-ghost" id="ghost"></div>
<div class="tooltip" id="tooltip"></div>

<script>
// ===== DATA =====
const DEFS = {
  door:        {name:'Puerta',     w:.9, h:.1, color:'#8B4513'},
  window:      {name:'Ventana',    w:1.2,h:.1, color:'#87CEEB'},
  bed_single:  {name:'Cama Ind.',  w:.9, h:1.9,color:'#6B8E9B'},
  bed_double:  {name:'Cama Doble', w:1.5,h:2.0,color:'#5B7E8B'},
  sofa:        {name:'Sofa',       w:2.0,h:.85,color:'#8B6F5E'},
  table:       {name:'Mesa',       w:1.2,h:.8, color:'#A0855B'},
  desk:        {name:'Escritorio', w:1.2,h:.6, color:'#7A6B5B'},
  wardrobe:    {name:'Armario',    w:1.2,h:.6, color:'#6B5B4B'},
  chair:       {name:'Silla',      w:.45,h:.45,color:'#9B8B7B'},
  nightstand:  {name:'Mesita',     w:.45,h:.4, color:'#7B6B5B'},
  bookshelf:   {name:'Estanteria', w:.8, h:.35,color:'#8B7B6B'},
  tv:          {name:'TV',         w:1.2,h:.1, color:'#2C2C2C'},
  dining_table:{name:'Mesa Comedor',w:1.6,h:.9,color:'#A08050'},
  fridge:      {name:'Nevera',     w:.6, h:.65,color:'#C0C0C0'},
};
const COLORS=['#6B8E9B','#5B7E8B','#8B6F5E','#A0855B','#7A6B5B','#6B5B4B','#9B8B7B',
  '#8B4513','#87CEEB','#2C2C2C','#C0C0C0','#e94560','#4CAF50','#FF9800','#9C27B0','#fff'];

let items=[], selectedId=null, roomW=5, roomH=4;
let zoom=1, panX=0, panY=0;
let showGrid=true, snapOn=true, showLabels=true;
const SNAP=0.05;

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('wrap');
let cW,cH;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function ppm(){return 80*zoom}
function sn(v){return snapOn?Math.round(v/SNAP)*SNAP:v}
function w2s(x,y){return{x:cW/2+(x-roomW/2)*ppm()+panX, y:cH/2+(y-roomH/2)*ppm()+panY}}
function s2w(x,y){return{x:(x-cW/2-panX)/ppm()+roomW/2, y:(y-cH/2-panY)/ppm()+roomH/2}}
function hit(wx,wy){
  for(let i=items.length-1;i>=0;i--){
    const it=items[i],rad=-(it.rot||0)*Math.PI/180,c=Math.cos(rad),s=Math.sin(rad),dx=wx-it.x,dy=wy-it.y;
    if(Math.abs(dx*c-dy*s)<=it.w/2&&Math.abs(dx*s+dy*c)<=it.h/2)return it;
  }return null;
}
function rotHandle(sx,sy,it){
  if(!it)return false;
  const sc=w2s(it.x,it.y),ph=it.h*ppm(),rad=(it.rot||0)*Math.PI/180;
  const hx=sc.x-Math.sin(rad)*(ph/2+16), hy=sc.y-Math.cos(rad)*(ph/2+16);
  return(sx-hx)**2+(sy-hy)**2<500;
}

// ===== RESIZE / DRAW =====
function resize(){
  const dpr=window.devicePixelRatio||1;
  cW=wrap.clientWidth; cH=wrap.clientHeight;
  canvas.width=cW*dpr; canvas.height=cH*dpr;
  canvas.style.width=cW+'px'; canvas.style.height=cH+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  draw();
}

function draw(){
  ctx.clearRect(0,0,cW,cH);
  const tl=w2s(0,0),br=w2s(roomW,roomH),rw=br.x-tl.x,rh=br.y-tl.y;

  if(showGrid){
    ctx.strokeStyle='#ffffff08';ctx.lineWidth=1;
    const gs=zoom>=.5?.5:1;
    for(let x=0;x<=roomW;x+=gs){const a=w2s(x,0),b=w2s(x,roomH);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
    for(let y=0;y<=roomH;y+=gs){const a=w2s(0,y),b=w2s(roomW,y);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
  }

  ctx.fillStyle='#1e2a3a';ctx.fillRect(tl.x,tl.y,rw,rh);
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=3;ctx.strokeRect(tl.x,tl.y,rw,rh);

  if(showLabels){
    ctx.fillStyle='#aaa';ctx.font='11px Segoe UI';ctx.textAlign='center';
    ctx.fillText(roomW.toFixed(1)+' m',tl.x+rw/2,tl.y-8);
    ctx.save();ctx.translate(tl.x-10,tl.y+rh/2);ctx.rotate(-Math.PI/2);
    ctx.fillText(roomH.toFixed(1)+' m',0,0);ctx.restore();
  }

  items.forEach(it=>drawItem(it,it.id===selectedId));
  document.getElementById('infoBar').textContent=`Zoom: ${Math.round(zoom*100)}% | ${roomW.toFixed(1)}m × ${roomH.toFixed(1)}m | ${items.length} obj`;
}

function drawItem(it,sel){
  const p=ppm(),sc=w2s(it.x,it.y),pw=it.w*p,ph=it.h*p,rad=(it.rot||0)*Math.PI/180;
  const x=-pw/2, y=-ph/2;
  ctx.save();ctx.translate(sc.x,sc.y);ctx.rotate(rad);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';
  roundRect(ctx,x+3,y+3,pw,ph,4);ctx.fill();

  // Draw shape by type
  const c=it.color, dark=darken(c,.25), light=lighten(c,.2);
  const drawer=SHAPES[it.type]||SHAPES._default;
  drawer(ctx,x,y,pw,ph,c,dark,light);

  // Selection outline
  ctx.strokeStyle=sel?'#e94560':'rgba(255,255,255,.1)';ctx.lineWidth=sel?2.5:1;
  ctx.strokeRect(x,y,pw,ph);

  // Label
  if(showLabels&&pw>24&&ph>14){
    const fs=Math.max(7,Math.min(12,Math.min(pw,ph)*.2));
    ctx.fillStyle='#fff';ctx.font=`bold ${fs}px Segoe UI`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=3;
    ctx.fillText(it.w.toFixed(2)+'×'+it.h.toFixed(2)+'m',0,ph>30?ph/2-fs*.7:0);
    ctx.shadowBlur=0;
  }

  // Rotation handle
  if(sel){
    ctx.fillStyle='#e94560';ctx.beginPath();ctx.arc(0,-ph/2-16,6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#e94560';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,-ph/2);ctx.lineTo(0,-ph/2-10);ctx.stroke();
  }
  ctx.restore();
}

function roundRect(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function darken(hex,f){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.round(r*(1-f))},${Math.round(g*(1-f))},${Math.round(b*(1-f))})`}
function lighten(hex,f){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,Math.round(r+(255-r)*f))},${Math.min(255,Math.round(g+(255-g)*f))},${Math.min(255,Math.round(b+(255-b)*f))})`}

const SHAPES = {
  // ---- DOOR: wall opening with swing arc ----
  door(c,x,y,w,h,col,dk,lt){
    // Wall gap
    c.fillStyle='#2a1a0a';c.fillRect(x,y,w,h);
    // Door panel
    const dw=w*.85,dh=h;
    c.fillStyle=col;c.fillRect(x,y,dw,dh);
    c.strokeStyle=dk;c.lineWidth=1;c.strokeRect(x,y,dw,dh);
    // Handle
    c.fillStyle='#DAA520';c.beginPath();c.arc(x+dw-w*.12,y+dh/2,Math.max(2,w*.03),0,Math.PI*2);c.fill();
    // Swing arc
    c.strokeStyle=dk;c.lineWidth=1;c.setLineDash([4,4]);
    c.beginPath();c.arc(x,y,w,0,Math.PI/2);c.stroke();
    c.setLineDash([]);
  },

  // ---- WINDOW: glass panes with frame ----
  window(c,x,y,w,h,col,dk,lt){
    const pad=2;
    // Frame
    c.fillStyle='#f5f5f0';c.fillRect(x,y,w,h);
    c.fillStyle=col;c.fillRect(x+pad,y+pad,w-pad*2,h-pad*2);
    // Center divider
    c.strokeStyle='#f5f5f0';c.lineWidth=2;
    c.beginPath();c.moveTo(x+w/2,y);c.lineTo(x+w/2,y+h);c.stroke();
    // Glass shine
    c.fillStyle='rgba(255,255,255,.2)';
    c.fillRect(x+pad+2,y+pad+1,(w/2)-pad-4,h-pad*2-2);
  },

  // ---- BED SINGLE ----
  bed_single(c,x,y,w,h,col,dk,lt){
    // Mattress
    roundRect(c,x+2,y+2,w-4,h-4,6);c.fillStyle=lt;c.fill();
    roundRect(c,x+2,y+2,w-4,h-4,6);c.strokeStyle=dk;c.lineWidth=1;c.stroke();
    // Headboard
    roundRect(c,x,y,w,h*.12,4);c.fillStyle=dk;c.fill();
    // Pillow
    const pw=w*.6,ppd=h*.08;
    roundRect(c,x+(w-pw)/2,y+h*.14,pw,h*.15,4);c.fillStyle='#e8e4df';c.fill();
    c.strokeStyle='#ccc';c.lineWidth=.5;c.stroke();
    // Blanket fold
    c.strokeStyle=col;c.lineWidth=1.5;
    c.beginPath();c.moveTo(x+6,y+h*.45);c.lineTo(x+w-6,y+h*.45);c.stroke();
  },

  // ---- BED DOUBLE ----
  bed_double(c,x,y,w,h,col,dk,lt){
    roundRect(c,x+2,y+2,w-4,h-4,6);c.fillStyle=lt;c.fill();
    roundRect(c,x+2,y+2,w-4,h-4,6);c.strokeStyle=dk;c.lineWidth=1;c.stroke();
    // Headboard
    roundRect(c,x,y,w,h*.1,4);c.fillStyle=dk;c.fill();
    // Two pillows
    const pw=w*.38,pg=w*.04;
    roundRect(c,x+pg,y+h*.12,pw,h*.12,4);c.fillStyle='#e8e4df';c.fill();c.strokeStyle='#ccc';c.lineWidth=.5;c.stroke();
    roundRect(c,x+w-pg-pw,y+h*.12,pw,h*.12,4);c.fillStyle='#e8e4df';c.fill();c.strokeStyle='#ccc';c.lineWidth=.5;c.stroke();
    // Center line (blanket split)
    c.strokeStyle=col;c.lineWidth=1;
    c.beginPath();c.moveTo(x+w/2,y+h*.3);c.lineTo(x+w/2,y+h*.9);c.stroke();
    // Blanket fold
    c.strokeStyle=col;c.lineWidth=1.5;
    c.beginPath();c.moveTo(x+6,y+h*.4);c.lineTo(x+w-6,y+h*.4);c.stroke();
  },

  // ---- SOFA ----
  sofa(c,x,y,w,h,col,dk,lt){
    // Back
    roundRect(c,x,y,w,h*.3,4);c.fillStyle=dk;c.fill();
    // Seat
    roundRect(c,x+h*.15,y+h*.25,w-h*.3,h*.75,4);c.fillStyle=col;c.fill();
    // Arms
    roundRect(c,x,y+h*.2,h*.18,h*.8,4);c.fillStyle=dk;c.fill();
    roundRect(c,x+w-h*.18,y+h*.2,h*.18,h*.8,4);c.fillStyle=dk;c.fill();
    // Cushion lines
    c.strokeStyle=lt;c.lineWidth=1;
    const seats=w>h*2?3:2;
    const sw=(w-h*.3)/seats;
    for(let i=1;i<seats;i++){
      const lx=x+h*.15+sw*i;
      c.beginPath();c.moveTo(lx,y+h*.35);c.lineTo(lx,y+h*.9);c.stroke();
    }
  },

  // ---- TABLE ----
  table(c,x,y,w,h,col,dk,lt){
    // Tabletop
    roundRect(c,x,y,w,h,3);c.fillStyle=col;c.fill();
    c.strokeStyle=dk;c.lineWidth=1.5;c.stroke();
    // Legs
    const lg=Math.max(3,Math.min(w,h)*.08);
    c.fillStyle=dk;
    c.fillRect(x+lg,y+lg,lg,lg);
    c.fillRect(x+w-lg*2,y+lg,lg,lg);
    c.fillRect(x+lg,y+h-lg*2,lg,lg);
    c.fillRect(x+w-lg*2,y+h-lg*2,lg,lg);
  },

  // ---- DESK ----
  desk(c,x,y,w,h,col,dk,lt){
    // Desktop surface
    roundRect(c,x,y,w,h,3);c.fillStyle=col;c.fill();
    c.strokeStyle=dk;c.lineWidth=1;c.stroke();
    // Drawer section
    const dw=w*.35,dh=h*.7;
    c.fillStyle=dk;c.fillRect(x+w-dw-4,y+(h-dh)/2,dw,dh);
    // Drawer lines
    c.strokeStyle=lt;c.lineWidth=.8;
    const dy=dh/3;
    for(let i=1;i<3;i++){
      const ly=y+(h-dh)/2+dy*i;
      c.beginPath();c.moveTo(x+w-dw-2,ly);c.lineTo(x+w-6,ly);c.stroke();
    }
    // Drawer handles
    c.fillStyle=lt;
    for(let i=0;i<3;i++){
      c.beginPath();c.arc(x+w-dw/2-2,y+(h-dh)/2+dy*i+dy/2,1.5,0,Math.PI*2);c.fill();
    }
  },

  // ---- WARDROBE ----
  wardrobe(c,x,y,w,h,col,dk,lt){
    // Body
    roundRect(c,x,y,w,h,3);c.fillStyle=col;c.fill();
    c.strokeStyle=dk;c.lineWidth=1.5;c.stroke();
    // Two doors
    c.strokeStyle=dk;c.lineWidth=1;
    c.beginPath();c.moveTo(x+w/2,y+2);c.lineTo(x+w/2,y+h-2);c.stroke();
    // Handles
    c.fillStyle=lt;
    c.beginPath();c.arc(x+w/2-5,y+h/2,2,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+w/2+5,y+h/2,2,0,Math.PI*2);c.fill();
  },

  // ---- CHAIR ----
  chair(c,x,y,w,h,col,dk,lt){
    // Backrest
    roundRect(c,x+w*.1,y,w*.8,h*.25,3);c.fillStyle=dk;c.fill();
    // Seat
    roundRect(c,x,y+h*.2,w,h*.8,3);c.fillStyle=col;c.fill();
    c.strokeStyle=dk;c.lineWidth=1;c.stroke();
    // Legs
    const lg=Math.max(2,w*.1);
    c.fillStyle=dk;
    c.fillRect(x+lg*.5,y+h-lg,lg,lg);
    c.fillRect(x+w-lg*1.5,y+h-lg,lg,lg);
  },

  // ---- NIGHTSTAND ----
  nightstand(c,x,y,w,h,col,dk,lt){
    roundRect(c,x,y,w,h,3);c.fillStyle=col;c.fill();
    c.strokeStyle=dk;c.lineWidth=1;c.stroke();
    // Drawer
    c.strokeStyle=dk;c.lineWidth=.8;
    c.beginPath();c.moveTo(x+3,y+h/2);c.lineTo(x+w-3,y+h/2);c.stroke();
    // Handle
    c.fillStyle=lt;
    c.beginPath();c.arc(x+w/2,y+h*.3,1.5,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+w/2,y+h*.7,1.5,0,Math.PI*2);c.fill();
  },

  // ---- BOOKSHELF ----
  bookshelf(c,x,y,w,h,col,dk,lt){
    // Body
    c.fillStyle=col;c.fillRect(x,y,w,h);
    c.strokeStyle=dk;c.lineWidth=1;c.strokeRect(x,y,w,h);
    // Shelves
    const rows=3, rh=h/rows;
    for(let i=1;i<rows;i++){
      c.strokeStyle=dk;c.lineWidth=1;
      c.beginPath();c.moveTo(x,y+rh*i);c.lineTo(x+w,y+rh*i);c.stroke();
    }
    // Books (colored blocks)
    const bookColors=['#c0392b','#2980b9','#27ae60','#f39c12','#8e44ad','#d35400'];
    for(let r=0;r<rows;r++){
      let bx=x+2;
      const by=y+rh*r+2, bh=rh-4;
      let bi=0;
      while(bx<x+w-4){
        const bw=Math.max(3,Math.min(w*.12,3+Math.random()*5));
        c.fillStyle=bookColors[(r*4+bi)%bookColors.length];
        c.fillRect(bx,by,bw,bh);
        bx+=bw+1;bi++;
      }
    }
  },

  // ---- TV ----
  tv(c,x,y,w,h,col,dk,lt){
    // Screen
    c.fillStyle='#1a1a1a';c.fillRect(x,y,w,h);
    // Bezel
    c.strokeStyle='#444';c.lineWidth=1.5;c.strokeRect(x,y,w,h);
    // Screen reflection
    c.fillStyle='rgba(255,255,255,.05)';
    c.fillRect(x+2,y+1,w*.4,h-2);
    // Stand indicator
    c.fillStyle='#555';
    const sw=w*.15;
    c.fillRect(x+w/2-sw/2,y+h-1,sw,2);
  },

  // ---- DINING TABLE ----
  dining_table(c,x,y,w,h,col,dk,lt){
    // Table surface
    roundRect(c,x+4,y+4,w-8,h-8,6);c.fillStyle=col;c.fill();
    c.strokeStyle=dk;c.lineWidth=1.5;c.stroke();
    // Legs
    const lg=Math.max(3,Math.min(w,h)*.07);
    c.fillStyle=dk;
    [[x+lg+2,y+lg+2],[x+w-lg*2-2,y+lg+2],[x+lg+2,y+h-lg*2-2],[x+w-lg*2-2,y+h-lg*2-2]].forEach(([lx,ly])=>{
      c.fillRect(lx,ly,lg,lg);
    });
    // Place settings hint
    c.strokeStyle=lt;c.lineWidth=.5;
    const plates=Math.max(2,Math.floor(w/(h*.5)));
    const spacing=w/(plates+1);
    for(let i=1;i<=plates;i++){
      c.beginPath();c.arc(x+spacing*i,y+h/2,Math.min(h*.2,8),0,Math.PI*2);c.stroke();
    }
  },

  // ---- FRIDGE ----
  fridge(c,x,y,w,h,col,dk,lt){
    // Body
    roundRect(c,x,y,w,h,3);c.fillStyle=col;c.fill();
    c.strokeStyle=dk;c.lineWidth=1.5;c.stroke();
    // Door split (freezer top)
    const split=h*.35;
    c.strokeStyle=dk;c.lineWidth=1;
    c.beginPath();c.moveTo(x+2,y+split);c.lineTo(x+w-2,y+split);c.stroke();
    // Handles
    c.strokeStyle='#999';c.lineWidth=2;c.lineCap='round';
    c.beginPath();c.moveTo(x+w-6,y+split*.3);c.lineTo(x+w-6,y+split*.7);c.stroke();
    c.beginPath();c.moveTo(x+w-6,y+split+h*.1);c.lineTo(x+w-6,y+split+h*.4);c.stroke();
    c.lineCap='butt';
  },

  // ---- DEFAULT (custom items) ----
  _default(c,x,y,w,h,col,dk,lt){
    roundRect(c,x,y,w,h,4);c.fillStyle=col;c.fill();
    c.strokeStyle=dk;c.lineWidth=1;c.stroke();
    // Cross pattern to show it's custom
    c.strokeStyle=lt;c.lineWidth=.5;c.setLineDash([3,3]);
    c.beginPath();c.moveTo(x+w*.2,y+h*.2);c.lineTo(x+w*.8,y+h*.8);c.stroke();
    c.beginPath();c.moveTo(x+w*.8,y+h*.2);c.lineTo(x+w*.2,y+h*.8);c.stroke();
    c.setLineDash([]);
  }
};

// ===== INTERACTION (mouse + touch unified) =====
let drag=null, panState=null, rotating=null, pinch=null;
let dragNew=null; // {type, started}

function canvasXY(e){
  const r=canvas.getBoundingClientRect(), t=e.touches?e.touches[0]:e;
  return{x:t.clientX-r.left, y:t.clientY-r.top};
}

// -- Canvas pointer events --
function onCanvasDown(e,pt){
  if(selectedId){
    const sel=items.find(i=>i.id===selectedId);
    if(sel&&rotHandle(pt.x,pt.y,sel)){rotating=sel;return}
  }
  const w=s2w(pt.x,pt.y), h2=hit(w.x,w.y);
  if(h2){
    select(h2.id);
    const idx=items.indexOf(h2);items.splice(idx,1);items.push(h2);
    drag={id:h2.id,ox:w.x-h2.x,oy:w.y-h2.y};
    return;
  }
  select(null);
  panState={sx:pt.x,sy:pt.y,px0:panX,py0:panY};
}

function onCanvasMove(e,pt){
  if(rotating){
    const sc=w2s(rotating.x,rotating.y);
    let a=Math.atan2(pt.x-sc.x,-(pt.y-sc.y))*180/Math.PI;
    if(snapOn)a=Math.round(a/15)*15;
    rotating.rot=((a%360)+360)%360;
    refreshProps();draw();return;
  }
  if(drag){
    const w=s2w(pt.x,pt.y),it=items.find(i=>i.id===drag.id);
    if(it){it.x=sn(w.x-drag.ox);it.y=sn(w.y-drag.oy);refreshProps();draw()}
    return;
  }
  if(panState){
    panX=panState.px0+(pt.x-panState.sx);
    panY=panState.py0+(pt.y-panState.sy);
    draw();return;
  }
  // Hover tooltip (mouse only)
  if(!e.touches){
    const w=s2w(pt.x,pt.y),h2=hit(w.x,w.y),tt=document.getElementById('tooltip');
    if(h2){tt.style.display='block';tt.style.left=(e.clientX+12)+'px';tt.style.top=(e.clientY+12)+'px';tt.textContent=`${h2.name} (${h2.w.toFixed(2)}×${h2.h.toFixed(2)}m)`;canvas.style.cursor='pointer'}
    else{tt.style.display='none';canvas.style.cursor='default'}
  }
}

function onCanvasUp(){drag=null;panState=null;rotating=null}

// Mouse
canvas.addEventListener('mousedown',e=>{onCanvasDown(e,canvasXY(e))});
canvas.addEventListener('mousemove',e=>{onCanvasMove(e,canvasXY(e))});
canvas.addEventListener('mouseup',onCanvasUp);
canvas.addEventListener('mouseleave',()=>{document.getElementById('tooltip').style.display='none'});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?.9:1.1, nz=Math.max(.15,Math.min(6,zoom*f)),pt=canvasXY(e);
  panX=pt.x-(pt.x-panX)*(nz/zoom);panY=pt.y-(pt.y-panY)*(nz/zoom);
  zoom=nz;draw();
},{passive:false});

// Touch on canvas
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const t=e.touches;
    pinch={d0:Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY),z0:zoom};
    drag=null;panState=null;return;
  }
  onCanvasDown(e,canvasXY(e));
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(pinch&&e.touches.length===2){
    const t=e.touches,d=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    const nz=Math.max(.15,Math.min(6,pinch.z0*(d/pinch.d0)));
    const r=canvas.getBoundingClientRect(),cx=(t[0].clientX+t[1].clientX)/2-r.left,cy=(t[0].clientY+t[1].clientY)/2-r.top;
    panX=cx-(cx-panX)*(nz/zoom);panY=cy-(cy-panY)*(nz/zoom);
    zoom=nz;draw();return;
  }
  if(e.touches.length===1)onCanvasMove(e,canvasXY(e));
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();pinch=null;onCanvasUp()},{passive:false});

// ===== DRAG FROM CATALOG (mouse + touch) =====
const ghost=document.getElementById('ghost');

document.querySelectorAll('.catalog-item[data-type]').forEach(el=>{
  const type=el.dataset.type;

  // Mouse drag from sidebar
  el.addEventListener('mousedown',e=>{
    e.preventDefault();
    dragNew={type,active:false};
    ghost.textContent=DEFS[type].name;
    ghost.style.display='block';
    ghost.style.left=(e.clientX+10)+'px';
    ghost.style.top=(e.clientY+10)+'px';
  });

  // Touch drag from sidebar
  el.addEventListener('touchstart',e=>{
    e.preventDefault();
    dragNew={type,active:false};
    const t=e.touches[0];
    ghost.textContent=DEFS[type].name;
    ghost.style.display='block';
    ghost.style.left=(t.clientX+10)+'px';
    ghost.style.top=(t.clientY+10)+'px';
  },{passive:false});
});

// Global move for catalog drag
function onGlobalMove(cx,cy){
  if(!dragNew)return;
  dragNew.active=true;
  ghost.style.left=(cx+10)+'px';
  ghost.style.top=(cy+10)+'px';
}
function onGlobalUp(cx,cy){
  if(!dragNew){return}
  ghost.style.display='none';
  // Check if dropped on canvas
  const r=canvas.getBoundingClientRect();
  if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){
    const def=DEFS[dragNew.type];
    const w=s2w(cx-r.left,cy-r.top);
    const it={id:uid(),type:dragNew.type,name:def.name,x:sn(w.x),y:sn(w.y),w:def.w,h:def.h,color:def.color,rot:0};
    items.push(it);select(it.id);draw();
  } else if(!dragNew.active){
    // Was a tap, not a drag — add to center
    const def=DEFS[dragNew.type];
    const it={id:uid(),type:dragNew.type,name:def.name,x:sn(roomW/2),y:sn(roomH/2),w:def.w,h:def.h,color:def.color,rot:0};
    items.push(it);select(it.id);draw();
  }
  dragNew=null;
}

document.addEventListener('mousemove',e=>{onGlobalMove(e.clientX,e.clientY)});
document.addEventListener('mouseup',e=>{onGlobalUp(e.clientX,e.clientY)});
document.addEventListener('touchmove',e=>{if(dragNew){e.preventDefault();const t=e.touches[0];onGlobalMove(t.clientX,t.clientY)}},{passive:false});
document.addEventListener('touchend',e=>{if(dragNew){const t=e.changedTouches[0];onGlobalUp(t.clientX,t.clientY)}});

// ===== SELECT / PROPS =====
function select(id){
  selectedId=id;
  const p=document.getElementById('propsPanel');
  if(id){p.classList.add('active');refreshProps()}else{p.classList.remove('active')}
  draw();
}

function refreshProps(){
  const it=items.find(i=>i.id===selectedId);if(!it)return;
  document.getElementById('propName').textContent=it.name;
  document.getElementById('propW').value=it.w.toFixed(2);
  document.getElementById('propH').value=it.h.toFixed(2);
  document.getElementById('propX').value=it.x.toFixed(2);
  document.getElementById('propY').value=it.y.toFixed(2);
  document.getElementById('propR').value=Math.round(it.rot||0);
  const co=document.getElementById('colorOpts');co.innerHTML='';
  COLORS.forEach(c=>{const d=document.createElement('div');d.className='color-swatch'+(c===it.color?' active':'');d.style.background=c;d.onclick=()=>{it.color=c;refreshProps();draw()};co.appendChild(d)});
}

function applyProps(){
  const it=items.find(i=>i.id===selectedId);if(!it)return;
  it.w=Math.max(.05,parseFloat(document.getElementById('propW').value)||it.w);
  it.h=Math.max(.05,parseFloat(document.getElementById('propH').value)||it.h);
  it.x=parseFloat(document.getElementById('propX').value)??it.x;
  it.y=parseFloat(document.getElementById('propY').value)??it.y;
  it.rot=parseFloat(document.getElementById('propR').value)||0;
  refreshProps();draw();
}

function rotSel(d){const it=items.find(i=>i.id===selectedId);if(!it)return;it.rot=(((it.rot||0)+d)%360+360)%360;refreshProps();draw()}
function dupSel(){const it=items.find(i=>i.id===selectedId);if(!it)return;const d={...it,id:uid(),x:it.x+.3,y:it.y+.3};items.push(d);select(d.id);draw()}
function delSel(){if(!selectedId)return;items=items.filter(i=>i.id!==selectedId);select(null);draw()}
function addCustom(){
  const n=document.getElementById('customName').value||'Custom',w=parseFloat(document.getElementById('customW').value)||.8,h=parseFloat(document.getElementById('customH').value)||.8;
  items.push({id:uid(),type:'custom',name:n,x:sn(roomW/2),y:sn(roomH/2),w,h,color:'#8B6F5E',rot:0});
  select(items[items.length-1].id);draw();
}

// ===== ROOM / VIEW =====
function updateRoom(){roomW=parseFloat(document.getElementById('roomWidth').value)||5;roomH=parseFloat(document.getElementById('roomHeight').value)||4;resetView()}
function zoomIn(){zoom=Math.min(6,zoom*1.25);draw()}
function zoomOut(){zoom=Math.max(.15,zoom/1.25);draw()}
function resetView(){zoom=1;panX=0;panY=0;draw()}
function toggleGrid(){showGrid=!showGrid;document.getElementById('gridBtn').textContent='Cuadricula: '+(showGrid?'ON':'OFF');draw()}
function toggleSnap(){snapOn=!snapOn;document.getElementById('snapBtn').textContent='Snap: '+(snapOn?'ON':'OFF')}
function toggleLabels(){showLabels=!showLabels;document.getElementById('lblBtn').textContent='Medidas: '+(showLabels?'ON':'OFF');draw()}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='Delete'||e.key==='Backspace')delSel();
  else if(e.key==='r')rotSel(15);
  else if(e.key==='R')rotSel(-15);
  else if(e.key==='d'&&e.ctrlKey){e.preventDefault();dupSel()}
  else if(e.key==='Escape')select(null);
});

window.addEventListener('resize',resize);
resize();
</script>
